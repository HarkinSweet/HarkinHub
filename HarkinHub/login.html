<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | HarkinHub</title>

    <link rel="stylesheet" href="css/login.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <div class="left">

        <h1>🚀 HarkinHub</h1>

        <p>
            Welcome back!
        </p>

        <p class="small">
            Built by HarkinSweet • Empowering Smarter Schools
        </p>

    </div>

    <div class="right">

        <form id="loginForm">

            <h2>Welcome Back 👋</h2>

            <input
            type="email"
            id="email"
            placeholder="Email Address"
            required>

            <input
            type="password"
            id="password"
            placeholder="Password"
            required>
<div class="remember">
    <label>
        <input type="checkbox">
        Remember Me
    </label>

    <a href="#">Forgot Password?</a>
</div>
            <button>

                Login

            </button>

            <p>

                Don't have an account?

                <a href="signup.html">

                    Sign Up

                </a>

            </p>

        </form>

    </div>

</div>

</body>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script src="js/login.js"></script>

</html>
