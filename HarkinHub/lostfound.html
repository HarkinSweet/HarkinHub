<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lost & Found | HarkinHub</title>


<link rel="stylesheet" href="css/lostfound.css">


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>


<body>


<div class="container">


<h1>🎒 Lost & Found</h1>


<div class="form-box">


<select id="type">

<option value="">Select Type</option>

<option>Lost</option>

<option>Found</option>

</select>



<input id="item" placeholder="Item name">


<input id="location" placeholder="Location">


<input id="description" placeholder="Description">



<button id="addItem">

Submit Report

</button>


</div>



<table>


<thead>

<tr>

<th>Type</th>

<th>Item</th>

<th>Location</th>

<th>Description</th>

<th>Action</th>

</tr>

</thead>


<tbody id="itemList">


</tbody>


</table>



</div>



<script src="js/lostfound.js"></script>


</body>

</html>
