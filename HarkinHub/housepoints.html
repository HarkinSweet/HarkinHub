

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>House Points | HarkinHub</title>


<link rel="stylesheet" href="css/housepoints.css">


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">


</head>


<body>


<div class="container">


<h1>🏆 House Points</h1>



<div class="form-box">


<select id="house">

<option value="">Select House</option>

<option>Blue House</option>

<option>Red House</option>

<option>Green House</option>

<option>Yellow House</option>


</select>



<input 
id="student"
placeholder="Student Name">



<input 
id="points"
type="number"
placeholder="Points">



<input 
id="reason"
placeholder="Reason">



<button id="addPoints">

Add Points

</button>



</div>



<h2>🏅 Leaderboard</h2>


<table>


<thead>

<tr>

<th>House</th>

<th>Student</th>

<th>Points</th>

<th>Reason</th>

<th>Action</th>

</tr>

</thead>


<tbody id="pointsList">


</tbody>


</table>



</div>



<script src="js/housepoints.js"></script>


</body>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script src="js/housepoints.js"></script>

</html>
