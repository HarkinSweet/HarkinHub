

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | HarkinHub</title>

    <link rel="stylesheet" href="css/signup.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <div class="left">

        <h1>🚀 HarkinHub</h1>

        <p>
           Create your account and unlock smarter learning.
        </p>

        <p class="small">
            Built by HarkinSweet • Empowering Smarter Schools
        </p>

    </div>

    <div class="right">

        <form id="signupForm">

            <h2>Create Your Account 🚀</h2>

            <input
            type="text"
            id="fullname"
            placeholder="Full Name"
            required>

            <input
            type="email"
            id="email"
            placeholder="Email Address"
            required>

            <input
            type="password"
            id="password"
            placeholder="Password"
            required>

            <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm Password"
            required>


            <button>

                Create Account

            </button>

        <p>
    Already have an account?
    <a href="login.html">Login</a>
</p>

        </form>

    </div>

</div>

<script src="js/signup.js"></script>

</body>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script src="js/signup.js"></script>

</html>
