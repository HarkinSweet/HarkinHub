<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Study Planner</title>

<link rel="stylesheet"
href="css/dashboard.css">

</head>

<body>

<div class="main">

<h1>📚 Study Planner</h1>

<div class="progress-card">

<h3>Add Study Session</h3>

<input
id="studySubject"
placeholder="Subject">

<input
id="studyTime"
type="number"
placeholder="Minutes">

<button id="addStudy">

Add Session

</button>

</div>

<div class="progress-card">

<h3>Your Study Plan</h3>

<ul id="studyList">

</ul>

</div>

</div>

<script src="js/study.js"></script>

</body>

</html>
